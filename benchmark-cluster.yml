---
- hosts: swarm-manager
  become: yes
  vars:
    benchmark_url: "http://localhost:80/"
    benchmark_requests: 10000
    benchmark_concurrency: 100

  tasks:
    - name: Install apache2-utils (for ab benchmark tool)
      ansible.builtin.apt:
        name: apache2-utils
        state: present
        update_cache: yes

    - name: Deploy Nginx service with 1 replica
      ansible.builtin.shell: >
        docker service create
        --name nginx-benchmark
        --replicas 1
        --publish 80:80
        nginx
      ignore_errors: yes

    - name: Wait for service to be ready
      ansible.builtin.pause:
        seconds: 15

    - name: Benchmark with 1 instance
      ansible.builtin.shell: >
        ab -n {{ benchmark_requests }} -c {{ benchmark_concurrency }} {{ benchmark_url }}
      register: benchmark_1
      ignore_errors: yes

    - name: Show results for 1 instance
      ansible.builtin.debug:
        msg: "{{ benchmark_1.stdout_lines }}"

    # --- 2 instances ---
    - name: Scale to 2 instances
      ansible.builtin.shell: docker service scale nginx-benchmark=2

    - name: Wait for scaling
      ansible.builtin.pause:
        seconds: 15

    - name: Benchmark with 2 instances
      ansible.builtin.shell: >
        ab -n {{ benchmark_requests }} -c {{ benchmark_concurrency }} {{ benchmark_url }}
      register: benchmark_2
      ignore_errors: yes

    - name: Show results for 2 instances
      ansible.builtin.debug:
        msg: "{{ benchmark_2.stdout_lines }}"

    # --- 4 instances ---
    - name: Scale to 4 instances
      ansible.builtin.shell: docker service scale nginx-benchmark=4

    - name: Wait for scaling
      ansible.builtin.pause:
        seconds: 15

    - name: Benchmark with 4 instances
      ansible.builtin.shell: >
        ab -n {{ benchmark_requests }} -c {{ benchmark_concurrency }} {{ benchmark_url }}
      register: benchmark_4
      ignore_errors: yes

    - name: Show results for 4 instances
      ansible.builtin.debug:
        msg: "{{ benchmark_4.stdout_lines }}"

    # --- 8 instances ---
    - name: Scale to 8 instances
      ansible.builtin.shell: docker service scale nginx-benchmark=8

    - name: Wait for scaling
      ansible.builtin.pause:
        seconds: 15

    - name: Benchmark with 8 instances
      ansible.builtin.shell: >
        ab -n {{ benchmark_requests }} -c {{ benchmark_concurrency }} {{ benchmark_url }}
      register: benchmark_8
      ignore_errors: yes

    - name: Show results for 8 instances
      ansible.builtin.debug:
        msg: "{{ benchmark_8.stdout_lines }}"

    - name: Cleanup - remove nginx benchmark service
      ansible.builtin.shell: docker service rm nginx-benchmark
      ignore_errors: yes
