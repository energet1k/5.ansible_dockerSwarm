---
- hosts: web-server1
  tasks:
    - name: generate secret
      ansible.builtin.shell: openssl rand -hex 16 | base64
      register: command_output

    - name: debug
      ansible.builtin.debug:
        msg: "Secret password is {{ command_output.stdout }}"

- hosts: web-server2
  tasks:
    - name: print paswd
      ansible.builtin.debug:
        msg: "paswd is {{ command_output.stdout }}"
